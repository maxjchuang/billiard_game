<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billiard Game (Web Debug)</title>
    <script>
      // GitHub Pages SPA fallback: restore deep link after 404.html redirects to the app root.
      // See public/404.html.
      ;(() => {
        const redirect = sessionStorage.getItem('spa:redirect')
        if (!redirect) return
        sessionStorage.removeItem('spa:redirect')
        history.replaceState(null, '', redirect)
      })()
    </script>
    <script>
      // Basic failure hint if the module fails to load/boot.
      // (When boot succeeds, src/web.ts will update the status text.)
      setTimeout(() => {
        const el = document.getElementById('boot-status')
        if (!el) return
        if (el.textContent === 'booting') {
          el.textContent = '加载失败：请刷新重试'
        }
      }, 5000)
    </script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b1f15;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #boot-status {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        z-index: 9999;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="boot-status">booting</div>
    <script type="module" src="/src/web.ts"></script>
  </body>
</html>
